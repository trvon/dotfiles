services:
  jan-openclaw:
    build:
      context: ..
      dockerfile: openclaw/Dockerfile
    image: openclaw-yams:local
    container_name: jan-openclaw
    restart: unless-stopped
    user: root
    ports:
      - 127.0.0.1:18789:18789
      - 127.0.0.1:18791:18791
    pids_limit: 256
    extra_hosts:
      - host.docker.internal:host-gateway
    tmpfs:
      - /tmp:rw,exec,nosuid,size=1g
      - /home/node/.npm:rw,exec,nosuid,size=512m
      - /home/node/.cache:rw,exec,nosuid,size=512m
    volumes:
      - ${HOME}/.openclaw/sandbox/docker:/home/node/.openclaw
      - ${HOME}/research:/workspace/research
      - ${HOME}/Documents/depend/dotfiles:/home/node/.openclaw/workspace

  searxng:
    image: searxng/searxng:latest
    container_name: openclaw-searxng
    restart: unless-stopped
    ports:
      - 127.0.0.1:8888:8080
    environment:
      - BASE_URL=http://127.0.0.1:8888/
      - INSTANCE_NAME=openclaw-searxng
    volumes:
      - ${HOME}/Documents/depend/dotfiles/openclaw/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/search?q=health&format=json"]
      interval: 30s
      timeout: 10s
      retries: 5
