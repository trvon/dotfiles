services:
  jan-openclaw:
    build:
      context: ..
      dockerfile: openclaw/Dockerfile
    image: openclaw-yams:local
    container_name: jan-openclaw
    restart: unless-stopped
    user: root
    ports:
      - 127.0.0.1:18789:18789
      - 127.0.0.1:18791:18791
    pids_limit: 256
    extra_hosts:
      - host.docker.internal:host-gateway
    tmpfs:
      - /tmp:rw,exec,nosuid,size=1g
      - /home/node/.npm:rw,exec,nosuid,size=512m
      - /home/node/.cache:rw,exec,nosuid,size=512m
    volumes:
      - ${HOME}/.openclaw/sandbox/docker:/home/node/.openclaw
      - ${HOME}/.openclaw/sandbox/docker:/Users/trevon/.openclaw/sandbox/docker
      - ${HOME}/research:/workspace/research
      - ${HOME}/research:/Users/trevon/research
      - ${HOME}/Documents/depend/dotfiles:/workspace/dotfiles
      - ${HOME}/Documents/depend/dotfiles:/Users/trevon/Documents/depend/dotfiles
      - /var/run/docker.sock:/var/run/docker.sock

  searxng:
    image: searxng/searxng:latest
    container_name: openclaw-searxng
    restart: unless-stopped
    ports:
      - 127.0.0.1:8888:8080
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/
    volumes:
      - ${HOME}/Documents/depend/dotfiles/openclaw/searxng:/etc/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget --header='X-Forwarded-For: 127.0.0.1' --header='X-Real-IP: 127.0.0.1' -qO- 'http://127.0.0.1:8080/search?q=health&format=json' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
